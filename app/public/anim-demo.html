<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Anim Demo</title>
<style>
  html,body { margin:0; height:100%; background:#111; overflow:hidden; }
  .stage {
    position: relative;
    width: 100%;
    height: 100vh;
    max-width: 576px;
    margin: 0 auto;
    overflow: hidden;
  }
  .bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }

  .sprite {
    position: absolute;
    transform: translate(-50%, -100%);
    width: 23%;
    height: auto;
    image-rendering: -webkit-optimize-contrast;
    transition: left 700ms cubic-bezier(.65,0,.35,1), top 700ms cubic-bezier(.65,0,.35,1), opacity 250ms linear;
  }
  .sprite.hidden { opacity: 0; }

  .dough {
    position: absolute;
    transform: translate(-50%, -50%);
    width: 17.4%;
    height: auto;
    opacity: 0;
    transition: opacity 400ms ease;
  }
  .dough.show { opacity: 1; }

  @keyframes waddle {
    0%   { transform: translate(-50%, -100%) rotate(0deg) translateY(0); }
    25%  { transform: translate(-50%, -100%) rotate(-3deg) translateY(-2%); }
    50%  { transform: translate(-50%, -100%) rotate(0deg) translateY(0); }
    75%  { transform: translate(-50%, -100%) rotate(3deg) translateY(-2%); }
    100% { transform: translate(-50%, -100%) rotate(0deg) translateY(0); }
  }
  .waddle { animation: waddle 550ms ease-in-out infinite; }

  @keyframes knead {
    0%   { transform: translate(-50%, -100%) rotate(0deg) translateY(0) scaleY(1); }
    25%  { transform: translate(-50%, -100%) rotate(-2deg) translateY(1%) scaleY(0.97); }
    50%  { transform: translate(-50%, -100%) rotate(0deg) translateY(0) scaleY(1); }
    75%  { transform: translate(-50%, -100%) rotate(2deg) translateY(1%) scaleY(0.97); }
    100% { transform: translate(-50%, -100%) rotate(0deg) translateY(0) scaleY(1); }
  }
  .kneading { animation: knead 420ms ease-in-out infinite; }
</style>
</head>
<body>
<div class="stage">
  <img class="bg" src="./assets/gameplay/kitchen-empty.jpg">
  <img id="sprite" class="sprite waddle" src="./assets/gameplay/pose-idle-center.png">
  <img id="dough" class="dough" src="./assets/gameplay/dough-on-board.png">
</div>
<script>
const sprite = document.getElementById('sprite');
const dough = document.getElementById('dough');

const POS = {
  center: { left: 49.31, top: 40.43 },
  left:   { left: 35.33, top: 42.77 },
  centerDough: { left: 49.22, top: 40.53 },
};
const DOUGH_POS = { left: 51.04, top: 42.87 };
dough.style.left = DOUGH_POS.left + '%';
dough.style.top = DOUGH_POS.top + '%';

function setPos(p) {
  sprite.style.left = p.left + '%';
  sprite.style.top = p.top + '%';
}
function setImg(src) { sprite.src = src; }

setPos(POS.center);

async function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

async function loop() {
  while (true) {
    // idle at center, blank board
    sprite.classList.remove('kneading');
    sprite.classList.add('waddle');
    setImg('./assets/gameplay/pose-idle-center.png');
    setPos(POS.center);
    dough.classList.remove('show');
    await wait(1100);

    // move left to dough, switch pose
    sprite.classList.remove('waddle');
    setImg('./assets/gameplay/pose-knead-left.png');
    setPos(POS.left);
    await wait(750);

    // knead loop
    sprite.classList.add('kneading');
    await wait(1500);

    // move back to center with dough now on board
    sprite.classList.remove('kneading');
    setImg('./assets/gameplay/pose-idle-center-dough.png');
    setPos(POS.centerDough);
    await wait(750);
    dough.classList.add('show');
    sprite.classList.add('waddle');

    await wait(1400);
  }
}
loop();
</script>
</body>
</html>
